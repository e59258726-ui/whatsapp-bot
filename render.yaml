services:
  - type: web
    name: whatsapp-bot
    runtime: image
    repo: https://github.com/your-username/whatsapp-bot
    branch: main
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: BAILEYS_AUTH_DIR
        value: ./auth_info_baileys
    buildCommand: |
      npm install --production --no-audit --no-fund
      mkdir -p sessions logs auth_info_baileys
    startCommand: node index.js
