services:
  - type: web
    name: whatsapp-bot
    runtime: image
    repo: https://github.com/your-username/whatsapp-bot
    branch: main
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_OPTIONS
        value: "--max-old-space-size=256"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: true
    buildCommand: |
      apk add --no-cache chromium nss freetype harfbuzz ca-certificates ttf-freefont git
      npm ci --only=production --no-audit --no-fund
      mkdir -p sessions logs
    startCommand: node --max-old-space-size=256 index.js
